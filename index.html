<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Sea Advisors | Strategic Excellence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="spotlight"></div>
    <div class="grid-bg"></div>

    <nav>
        <div class="logo-area">
            <span class="logo">RED SEA ADVISORS</span>
            <span class="tagline">GLOBAL STRATEGIC EXCELLENCE</span>
        </div>
        <button class="lang-btn" onclick="toggleLanguage()">العربية</button>
    </nav>

    <main>
        <div class="content">
            <div class="badge">
                <span class="dot"></span>
                <span id="badge-text">LAUNCHING EARLY 2026</span>
            </div>
            <h1 id="main-title">BEYOND THE <br><span class="gold-text">HORIZON.</span></h1>
            <p id="description">Mastering complexity. Delivering clarity. We are architecting the next era of strategic dominance.</p>
        </div>

        <div class="form-container">
            <div class="form-card">
                <h2 id="form-title">Priority Registration</h2>
                <form id="access-form">
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Business Email" required>
                    <input type="text" placeholder="Company Name">
                    <button type="submit" class="submit-btn">INITIALIZE ACCESS</button>
                </form>
                <p class="footer-note">BALANCE . PRECISION . DOMINANCE</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="locations">RIYADH &nbsp; DUBAI &nbsp; AMMAN</div>
        <div class="copyright">© 2026 RSA STRATEGIC OPERATIONS</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
